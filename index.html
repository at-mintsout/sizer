<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image & PDF Resizer</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
</head>
<body>
    <div class="container">
        <h1>Image & PDF Resizer</h1>
        <p>Compress and resize your files locally in your browser.</p>

        <div class="card">
            <label for="fileInput">Choose an Image or PDF file:</label>
            <input type="file" id="fileInput" accept="image/*, application/pdf">
        </div>

        <div class="card settings" id="settingsArea" style="display:none;">
            <h3>Resize Settings</h3>
            <label for="scaleFactor">Scale Quality / Size (10% to 100%):</label>
            <input type="range" id="scaleFactor" min="10" max="100" value="80">
            <span id="scaleValue">80%</span>
            
            <button id="processBtn">Resize File</button>
        </div>

        <div class="card" id="downloadArea" style="display:none;">
            <h3>Ready!</h3>
            <a id="downloadLink" href="#" download>Download Resized File</a>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
